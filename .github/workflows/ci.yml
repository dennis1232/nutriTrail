name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nutrition
          POSTGRES_PASSWORD: nutrition
          POSTGRES_DB: nutrition_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nutrition"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://nutrition:nutrition@localhost:5432/nutrition_tracker
      DIRECT_URL: postgresql://nutrition:nutrition@localhost:5432/nutrition_tracker
      AUTH_SECRET: ci-test-secret-not-for-production-use-only
      AUTH_URL: http://localhost:3000
      AI_PROVIDER: mock
      STORAGE_PROVIDER: local
      FOOD_PROVIDER: mock
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: End-to-end tests
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
