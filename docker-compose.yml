services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: nutrition
      POSTGRES_DB: nutrition_tracker
    ports:
      - "55432:5432"
    volumes:
      - nutrition_tracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nutrition_tracker_postgres_data:
